<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Fermín Barba · Portfolio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000'/><circle cx='35' cy='50' r='28' fill='%2300fff5' opacity='0.9'/><circle cx='65' cy='50' r='28' fill='%23ff00aa' opacity='0.5'/></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=VT323&family=Press+Start+2P&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--cyan:#00fff5;--mag:#ff00aa;--yel:#ffe600;--purple:#7b00ff;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}

.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,2s) ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.2;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}}
.scanlines::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,245,0.04) 2px,rgba(0,255,245,0.04) 4px);pointer-events:none;z-index:5;border-radius:inherit;}
@keyframes crt-flicker{0%,100%{opacity:1}91%{opacity:1}93%{opacity:0.65}95%{opacity:1}97%{opacity:0.8}99%{opacity:1}}
.crt-flicker{animation:crt-flicker 5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}.blink{animation:blink 1s step-end infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}.float{animation:float 3s ease-in-out infinite;}
@keyframes crt-flash{0%{opacity:1}10%{opacity:0}22%{opacity:1}33%{opacity:0.15}44%{opacity:1}55%{opacity:0}70%{opacity:1}}
.flashing{animation:crt-flash 0.6s ease forwards!important;}

/* ── MAIN GRID: top bar | screen | controls ── */
#root{
  width:100vw;height:100vh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  background:linear-gradient(180deg,#050010 0%,#0d001e 50%,#050010 100%);
  border-left:3px solid rgba(0,255,245,0.4);
  border-right:3px solid rgba(0,255,245,0.4);
  position:relative;overflow:hidden;
}
#root::before,#root::after{
  content:'';position:absolute;top:0;bottom:0;width:16px;
  background:repeating-linear-gradient(180deg,var(--mag) 0,var(--mag) 4px,transparent 4px,transparent 18px);
  opacity:0.5;z-index:1;pointer-events:none;
}
#root::before{left:6px;}#root::after{right:6px;}

/* TOP BAR */
#top-bar{
  display:flex;align-items:center;justify-content:center;
  gap:clamp(20px,6vw,80px);
  background:linear-gradient(to right,#040010,#110022,#040010);
  border-bottom:2px solid rgba(0,255,245,0.3);
  padding:clamp(8px,1.8vh,18px) 24px;
  flex-shrink:0;position:relative;z-index:2;
}
.lamp{
  width:clamp(22px,4vw,38px);height:clamp(22px,4vw,38px);
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#aaa,#333);
  border:2px solid #555;
  box-shadow:0 0 14px rgba(255,200,0,0.3);
}
#top-label{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(0.7rem,2.5vw,1.2rem);
  font-weight:900;color:var(--cyan);
  letter-spacing:clamp(6px,2vw,14px);
  text-shadow:0 0 20px var(--cyan),0 0 40px var(--cyan);
}

/* SCREEN AREA — fills remaining grid row */
#screen-area{
  display:flex;align-items:stretch;justify-content:center;
  padding:clamp(10px,2vh,20px) clamp(24px,5vw,80px);
  min-height:0;
  position:relative;z-index:2;
}

/* CRT — fills screen-area completely */
#crt-bezel{
  flex:1;
  background:#000308;
  border:4px solid rgba(0,255,245,0.6);
  border-radius:10px;
  box-shadow:
    0 0 0 2px rgba(0,255,245,0.15),
    0 0 40px rgba(0,255,245,0.3),
    0 0 80px rgba(0,255,245,0.1),
    inset 0 0 60px rgba(0,0,0,0.85);
  cursor:pointer;
  position:relative;
  overflow:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:clamp(8px,2vh,20px);
}
/* vignette */
#crt-bezel::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 42%,rgba(0,0,0,0.82) 100%);
  pointer-events:none;z-index:6;border-radius:8px;
}
.s-label{
  font-family:'VT323',monospace;
  font-size:clamp(0.8rem,2.5vw,1.3rem);
  color:var(--mag);letter-spacing:4px;
  text-shadow:0 0 12px var(--mag);
  position:relative;z-index:2;
}
#face-img{
  width:clamp(120px,22%,260px);
  filter:brightness(0.88) contrast(1.12) sepia(0.08) hue-rotate(155deg) saturate(1.7);
  position:relative;z-index:2;
  animation:float 3s ease-in-out infinite;
}
#press-start{
  font-family:'VT323',monospace;
  font-size:clamp(1.4rem,5vw,2.6rem);
  color:var(--cyan);letter-spacing:5px;
  text-shadow:0 0 14px var(--cyan),0 0 28px var(--cyan);
  position:relative;z-index:2;
  animation:blink 1s step-end infinite;
}
#coin-txt{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.3rem,0.9vw,0.52rem);
  color:var(--yel);letter-spacing:3px;opacity:0.5;
  position:relative;z-index:2;
}

/* CONTROL PANEL */
#ctrl-panel{
  display:flex;align-items:flex-end;justify-content:space-around;
  background:linear-gradient(180deg,#0a001e,#040010);
  border-top:2px solid rgba(0,255,245,0.25);
  border-radius:0 0 30% 30%/0 0 18px 18px;
  padding:clamp(10px,2vh,20px) clamp(20px,6vw,80px) clamp(12px,2.5vh,24px);
  flex-shrink:0;
  position:relative;z-index:2;
  width:106%;align-self:center;
}
#ctrl-panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:repeating-linear-gradient(90deg,rgba(0,229,255,0.55) 0,rgba(0,229,255,0.55) 3px,transparent 3px,transparent 10px);
}
.js-wrap{display:flex;flex-direction:column;align-items:center;}
.js-stick{
  width:clamp(11px,2.2vw,20px);height:clamp(26px,5.5vh,44px);
  background:linear-gradient(180deg,#cc00aa,#660055);
  border-radius:6px 6px 3px 3px;
  box-shadow:0 0 12px var(--mag);margin-bottom:-5px;
}
.js-ball{
  width:clamp(42px,8vw,68px);height:clamp(42px,8vw,68px);
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#1a0030,#08001a);
  border:2px solid var(--mag);
  box-shadow:0 0 18px rgba(255,0,170,0.45);
}
.btn-row{display:flex;flex-wrap:wrap;gap:clamp(6px,1.2vw,12px);max-width:clamp(120px,24vw,200px);justify-content:center;}
.btn-c{
  border-radius:50%;border:2px solid rgba(255,255,255,0.12);
  width:clamp(20px,4vw,32px);height:clamp(20px,4vw,32px);
}
</style>
</head>

<script>
const sb=document.getElementById('stars-bg');
for(let i=0;i<100;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2+0.4;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s;`;
  sb.appendChild(s);
}
function enterGame(){
  document.getElementById('crt-bezel').classList.add('flashing');
  setTimeout(()=>window.location.href='menu.html',640);
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')enterGame();});
</script>
